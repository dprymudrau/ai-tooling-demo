name: On New Tests Action

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      action-info:
        description: "Contains json of data to be used in the action"
        required: true

jobs:
  create-pr:
    runs-on: ubuntu-latest
  steps:
     - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          branch: ${{ github.event.inputs.action-info.branch }}
          base: main
          title: ${{ github.event.inputs.action-info.title }}
          body: ${{ github.event.inputs.action-info.body }}
          labels: ai-generated-tests
          committer: GitHub <noreply@github.com>
          author: github-actions <github-actions@github.com>
          signoff: false
          delete-branch: false
          draft: false
          token: ${{ secrets.PAT_TOKEN }}


